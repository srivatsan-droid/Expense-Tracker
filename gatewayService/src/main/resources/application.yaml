server:
  port: 8080

spring:
  application:
    name: gatewayService

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true        # allows lb://SERVICE-NAME auto-discovery (optional but handy)
          lower-case-service-id: true

      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1          # optional: strips /api before forwarding, adjust to your controller mapping

        - id: expense-service
          uri: lb://EXPENSE-SERVICE
          predicates:
            - Path=/api/expenses/**
          filters:
            - StripPrefix=1

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG   # helpful while debugging route matching